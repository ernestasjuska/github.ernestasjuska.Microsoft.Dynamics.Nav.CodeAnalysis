# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Publish NuGet package

on:
  push:
    tags:
    - "prerelease/*"
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        shell: pwsh

    env:
      PROJECT_NAME: github.ernestasjuska.Microsoft.Dynamics.Nav.CodeAnalysis.csproj
      NUGET_SOURCE: "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Reject invalid prereleases
      if: startsWith(github.ref, 'refs/tags/prerelease/')
      run: |
        Set-StrictMode -Version Latest
        $ErrorActionPreference = 'Stop'

        $ExpectedTag = "prerelease/$(dotnet msbuild $env:PROJECT_NAME -getProperty:Version)"
        if ($ExpectedTag -ne $env:GITHUB_REF_NAME) {
            throw "Tag '$ExpectedTag' != '$env:GITHUB_REF_NAME'"
        }

    - name: Pack and publish
      if: startsWith(github.ref, 'refs/tags/prerelease/')
      env:
        NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        Set-StrictMode -Version Latest
        $ErrorActionPreference = 'Stop'
         
        # NOTE: We are in beta.
        $OutputDir = $(
          New-Item -ItemType Directory -Path '.output' -Force |
          Select-Object -ExpandProperty FullName
        )
        dotnet nuget add source $OutputDir --name local-output

        dotnet pack . `
          --configuration Debug `
          --property:GeneratePackageOnBuild=false `
          --output $OutputDir
        foreach ($Package in Get-ChildItem -Path "$OutputDir/*.nupkg") {
          dotnet nuget push $Package.FullName --source $env:NUGET_SOURCE --api-key $env:NUGET_AUTH_TOKEN
        }

        dotnet nuget remove source local-output